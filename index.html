<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Dash Origem Viva | Dashboard de Vendas</title>
    <meta name="description" content="Dashboard empresarial Origem Viva para gestão de boletos, PIX e pagamentos por cartão." />
    <meta name="author" content="Origem Viva" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0a0c0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dash Origem Viva" />
    <link rel="apple-touch-icon" href="/logo-ov.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Dash Origem Viva | Dashboard de Vendas" />
    <meta property="og:description" content="Dashboard empresarial para gestão de boletos, PIX e pagamentos por cartão." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-ov.png" />

    <!-- Critical inline styles -->
    <style>
      :root {
        color-scheme: dark;
      }
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #0a0c0f !important;
        color: #fafafa !important;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
        background-color: #0a0c0f;
      }
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0a0c0f;
      }
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1a1f2e;
        border-top-color: #22c55e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
